name: Publish Chrome Web Store

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: read

concurrency:
  group: chrome-web-store-publish
  cancel-in-progress: false

env:
  CWS_PUBLISHER_ID: 3359ea7f-1e86-4a04-afad-2179a56c07e8
  CWS_EXTENSION_ID: phgemhmkidohfhckegoemicfjeofnlbp

jobs:
  publish:
    environment: chrome-web-store
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Verify release version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./manifest.json').version")"
          if [[ "$REF_NAME" != "v$version" ]]; then
            echo "Tag $REF_NAME does not match manifest version $version" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tag must point to a commit on main" >&2
            exit 1
          fi
          echo "Publishing Group Tabs $version"

      - name: Test extension
        run: node test.mjs

      - name: Build extension package
        run: |
          set -euo pipefail
          zip -r group-tabs.zip \
            manifest.json background.js grouping.js \
            popup.html popup.js options.html options.js \
            welcome.html welcome.js privacy.html icons \
            -x "icons/icon.svg"
          unzip -t group-tabs.zip

      - name: Upload and submit for review
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          set -euo pipefail

          for secret in CWS_CLIENT_ID CWS_CLIENT_SECRET CWS_REFRESH_TOKEN; do
            if [[ -z "${!secret}" ]]; then
              echo "Missing GitHub secret: $secret" >&2
              exit 1
            fi
          done

          token_response="$(curl --silent --show-error --fail-with-body \
            -X POST https://oauth2.googleapis.com/token \
            --data-urlencode "client_id=$CWS_CLIENT_ID" \
            --data-urlencode "client_secret=$CWS_CLIENT_SECRET" \
            --data-urlencode "refresh_token=$CWS_REFRESH_TOKEN" \
            --data-urlencode "grant_type=refresh_token")"
          access_token="$(jq -er '.access_token' <<<"$token_response")"
          echo "::add-mask::$access_token"

          item="publishers/$CWS_PUBLISHER_ID/items/$CWS_EXTENSION_ID"
          upload_response="$(curl --silent --show-error --fail-with-body \
            -X POST \
            -H "Authorization: Bearer $access_token" \
            -H "Content-Type: application/zip" \
            -T group-tabs.zip \
            "https://chromewebstore.googleapis.com/upload/v2/$item:upload")"
          jq . <<<"$upload_response"
          upload_state="$(jq -er '.uploadState' <<<"$upload_response")"

          if [[ "$upload_state" == "IN_PROGRESS" ]]; then
            for _ in {1..30}; do
              sleep 10
              status_response="$(curl --silent --show-error --fail-with-body \
                -H "Authorization: Bearer $access_token" \
                "https://chromewebstore.googleapis.com/v2/$item:fetchStatus")"
              upload_state="$(jq -er '.lastAsyncUploadState' <<<"$status_response")"
              [[ "$upload_state" == "IN_PROGRESS" ]] || break
            done
          fi

          if [[ "$upload_state" != "SUCCEEDED" ]]; then
            echo "Package upload did not succeed: $upload_state" >&2
            exit 1
          fi

          publish_response="$(curl --silent --show-error --fail-with-body \
            -X POST \
            -H "Authorization: Bearer $access_token" \
            -H "Content-Type: application/json" \
            -d '{"publishType":"DEFAULT_PUBLISH","skipReview":false,"blockOnWarnings":false}' \
            "https://chromewebstore.googleapis.com/v2/$item:publish")"
          jq . <<<"$publish_response"
          publish_state="$(jq -er '.state' <<<"$publish_response")"

          case "$publish_state" in
            PENDING_REVIEW|PUBLISHED|PUBLISHED_TO_TESTERS) ;;
            *)
              echo "Unexpected publish state: $publish_state" >&2
              exit 1
              ;;
          esac

          version="$(node -p "require('./manifest.json').version")"
          {
            echo "### Chrome Web Store submission"
            echo "- Version: \`$version\`"
            echo "- Item: \`$CWS_EXTENSION_ID\`"
            echo "- State: \`$publish_state\`"
          } >> "$GITHUB_STEP_SUMMARY"
